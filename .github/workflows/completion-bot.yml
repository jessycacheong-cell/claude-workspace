name: CompletionBot

on:
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch:

jobs:
  refresh-completion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull latest data before writing
        run: git pull origin main

      - name: Fetch Notion To-Do DB and compute completion %
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TODO_DB_ID: 40a2c564dcb18363a795814bc4aa5382
          TZ: America/Chicago
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');

          function request(options, body) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); } catch(e) { reject(new Error('Bad JSON: ' + data.substring(0,300))); }
                });
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          async function queryAll() {
            const all = [];
            let cursor = undefined;
            for (let i = 0; i < 20; i++) {
              const body = JSON.stringify(cursor ? { page_size: 100, start_cursor: cursor } : { page_size: 100 });
              const res = await request({
                hostname: 'api.notion.com',
                path: `/v1/databases/${process.env.NOTION_TODO_DB_ID}/query`,
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.NOTION_API_KEY}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body)
                }
              }, body);
              if (!res.results) {
                console.error('Notion query failed:', JSON.stringify(res).substring(0, 400));
                process.exit(1);
              }
              all.push(...res.results);
              if (!res.has_more) break;
              cursor = res.next_cursor;
            }
            return all;
          }

          // Local date helpers (TZ already set via env)
          function ymd(d) {
            return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
          }
          function startOfWeekSun(d) {
            const x = new Date(d); x.setHours(0,0,0,0);
            x.setDate(x.getDate() - x.getDay()); // Sunday
            return x;
          }

          async function main() {
            const pages = await queryAll();
            console.log('Got', pages.length, 'todo tasks');

            const now = new Date();
            const todayStr = ymd(now);
            const weekStart = startOfWeekSun(now);
            const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate()+6);
            const month = now.getMonth();
            const year = now.getFullYear();

            const buckets = {
              today: { total: 0, done: 0 },
              week:  { total: 0, done: 0 },
              month: { total: 0, done: 0 },
              year:  { total: 0, done: 0 }
            };

            for (const p of pages) {
              const props = p.properties || {};
              const status = props['Status']?.status?.name || '';
              const dueRaw = props['Due date']?.date?.start;
              if (!dueRaw) continue;
              // Parse YYYY-MM-DD or full ISO. Use the date portion as local.
              const dueParts = dueRaw.slice(0,10).split('-');
              const due = new Date(parseInt(dueParts[0]), parseInt(dueParts[1])-1, parseInt(dueParts[2]));
              const isDone = status === 'Done';

              if (ymd(due) === todayStr) { buckets.today.total++; if (isDone) buckets.today.done++; }
              if (due >= weekStart && due <= weekEnd) { buckets.week.total++; if (isDone) buckets.week.done++; }
              if (due.getMonth() === month && due.getFullYear() === year) { buckets.month.total++; if (isDone) buckets.month.done++; }
              if (due.getFullYear() === year) { buckets.year.total++; if (isDone) buckets.year.done++; }
            }

            function pct(b) { return b.total === 0 ? 0 : Math.round(b.done / b.total * 100); }

            const completion = {
              today: pct(buckets.today),
              week:  pct(buckets.week),
              month: pct(buckets.month),
              year:  pct(buckets.year),
              totals: {
                today: buckets.today,
                week:  buckets.week,
                month: buckets.month,
                year:  buckets.year
              },
              updatedAt: new Date().toISOString()
            };

            const data = JSON.parse(fs.readFileSync('personal/data.json', 'utf8'));
            data.completion = completion;
            data.lastUpdated = new Date().toISOString();
            fs.writeFileSync('personal/data.json', JSON.stringify(data, null, 2));
            console.log('Completion updated:', completion);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Commit and push
        run: |
          git config user.name "CompletionBot"
          git config user.email "bot@jessyca-dashboard"
          git add personal/data.json
          git diff --staged --quiet || git commit -m "CompletionBot: refresh To-Do completion [skip ci]"
          git push || (git pull --rebase origin main && git push)
