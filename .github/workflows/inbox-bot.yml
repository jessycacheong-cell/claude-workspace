name: InboxBot — Gorgias Refresh

on:
  schedule:
    - cron: '10,40 * * * *'   # Every 30 minutes, offset to avoid collisions
  workflow_dispatch:           # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh-gorgias:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Pull latest data before writing
        run: git pull origin main

      - name: Fetch Gorgias tickets
        env:
          GORGIAS_API_KEY: ${{ secrets.GORGIAS_API_KEY }}
          GORGIAS_EMAIL: ${{ secrets.GORGIAS_EMAIL }}
        run: node personal/bots/gorgias-bot.js

      - name: Claude AI — summarize support tickets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('personal/data.json', 'utf8'));
          const tickets = data.inbox?.gorgias || [];
          const open = tickets.filter(t => t.status === 'open');
          const list = open.length ? open.map(t => `- "${t.subject}" (${t.customer})`).join('\n') : 'No open tickets.';
          const prompt = `UMEI3D Gorgias support queue:\n${list}\n\nWrite ONE casual sentence (max 15 words) about the support queue. Flag if anything looks like a real customer issue vs spam/promo.`;
          const body = JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 80, messages: [{ role: 'user', content: prompt }] });
          const req = https.request({ hostname: 'api.anthropic.com', path: '/v1/messages', method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': process.env.ANTHROPIC_API_KEY, 'anthropic-version': '2023-06-01', 'Content-Length': Buffer.byteLength(body) }
          }, res => {
            let d = ''; res.on('data', c => d += c);
            res.on('end', () => {
              const r = JSON.parse(d);
              const summary = r.content?.[0]?.text?.trim() || '';
              console.log('Claude gorgias summary:', summary);
              data.inbox = data.inbox || {};
              data.inbox.gorgiasSummary = summary;
              data.lastUpdated = new Date().toISOString();
              fs.writeFileSync('personal/data.json', JSON.stringify(data, null, 2));
            });
          });
          req.on('error', e => { console.error('Claude error:', e.message); process.exit(0); });
          req.write(body); req.end();
          EOF

      - name: Commit and push if changed
        run: |
          git config --global user.email "bot@umei3d.com"
          git config --global user.name "InboxBot"
          git add personal/data.json
          git diff --staged --quiet || git commit -m "InboxBot: refresh Gorgias + Claude summary [skip ci]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/jessycacheong-cell/claude-workspace.git
          git push || (git pull --rebase origin main && git push)
