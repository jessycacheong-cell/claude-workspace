name: InboxBot — Gorgias Refresh

on:
  schedule:
    - cron: '10,40 * * * *'   # Every 30 minutes, offset to avoid collisions
  workflow_dispatch:           # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh-gorgias:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Pull latest data before writing
        run: git pull origin main

      - name: Fetch Gorgias tickets
        env:
          GORGIAS_API_KEY: ${{ secrets.GORGIAS_API_KEY }}
          GORGIAS_EMAIL: ${{ secrets.GORGIAS_EMAIL }}
        run: node personal/bots/gorgias-bot.js

      - name: Commit and push if changed
        run: |
          git config --global user.email "bot@umei3d.com"
          git config --global user.name "InboxBot"
          git add personal/data.json
          git diff --staged --quiet || git commit -m "InboxBot: refresh Gorgias tickets [skip ci]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/jessycacheong-cell/claude-workspace.git
          git push || (git pull --rebase origin main && git push)
