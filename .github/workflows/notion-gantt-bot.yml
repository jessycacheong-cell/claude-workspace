name: NotionGanttBot

on:
  schedule:
    - cron: '12,42 * * * *'
  workflow_dispatch:

jobs:
  refresh-gantt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull latest data before writing
        run: git pull origin main

      - name: Fetch Notion Gantt and update data.json
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_GANTT_DB_ID: f53c0d7f5a704d20b7fea7d072f572f4
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');

          function request(options, body) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); } catch(e) { reject(new Error('Bad JSON: ' + data.substring(0,300))); }
                });
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          async function queryDatabase() {
            const body = JSON.stringify({ page_size: 100 });
            return request({
              hostname: 'api.notion.com',
              path: `/v1/databases/${process.env.NOTION_GANTT_DB_ID}/query`,
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.NOTION_API_KEY}`,
                'Notion-Version': '2022-06-28',
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(body)
              }
            }, body);
          }

          function plainText(arr) {
            if (!arr || !arr.length) return '';
            return arr.map(x => x.plain_text || '').join('').trim();
          }

          async function main() {
            const res = await queryDatabase();
            if (!res.results) {
              console.error('Notion query failed:', JSON.stringify(res).substring(0, 400));
              process.exit(1);
            }
            console.log('Got', res.results.length, 'tasks');

            const tasks = res.results.map(p => {
              const props = p.properties || {};
              const name = plainText(props['Task Name']?.title) || '(untitled)';
              const status = props['Status']?.status?.name || 'Not started';
              const team = props['Team']?.select?.name || null;
              const start = props['Start Date']?.date?.start || null;
              const end = props['End Date']?.date?.start || props['Start Date']?.date?.end || null;
              const milestone = props['Milestone']?.checkbox === true;
              const rawPct = props['% Complete']?.formula?.number;
              const progress = rawPct != null ? Math.min(100, Math.round(rawPct > 1 ? rawPct : rawPct * 100)) : null;
              return { name, status, team, start, end, milestone, progress, url: p.url };
            }).filter(t => t.start || t.end);

            const data = JSON.parse(fs.readFileSync('personal/data.json', 'utf8'));
            data.gantt = {
              tasks,
              updatedAt: new Date().toISOString()
            };
            data.lastUpdated = new Date().toISOString();
            fs.writeFileSync('personal/data.json', JSON.stringify(data, null, 2));
            console.log('Gantt updated:', tasks.length, 'dated tasks');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Commit and push
        run: |
          git config user.name "NotionGanttBot"
          git config user.email "bot@jessyca-dashboard"
          git add personal/data.json
          git diff --staged --quiet || git commit -m "NotionGanttBot: refresh Project Gantt [skip ci]"
          git push || (git pull --rebase origin main && git push)
