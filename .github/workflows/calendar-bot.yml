name: CalendarBot

on:
  schedule:
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:

jobs:
  refresh-calendar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull latest data before writing
        run: git pull origin main

      - name: Fetch Calendar and update data.json
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');

          async function request(options) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(JSON.parse(data)));
              });
              req.on('error', reject);
              req.end();
            });
          }

          async function post(options, body) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(JSON.parse(data)));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          async function getAccessToken() {
            const body = new URLSearchParams({
              client_id: process.env.GOOGLE_CLIENT_ID,
              client_secret: process.env.GOOGLE_CLIENT_SECRET,
              refresh_token: process.env.GOOGLE_REFRESH_TOKEN,
              grant_type: 'refresh_token'
            }).toString();

            const res = await post({
              hostname: 'oauth2.googleapis.com',
              path: '/token',
              method: 'POST',
              headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'Content-Length': Buffer.byteLength(body)
              }
            }, body);

            console.log('Token response:', JSON.stringify(res).substring(0, 100));
            if (!res.access_token) throw new Error('Failed to get access token: ' + JSON.stringify(res));
            return res.access_token;
          }

          async function calGet(path, token) {
            return request({
              hostname: 'www.googleapis.com',
              path,
              headers: { Authorization: `Bearer ${token}` }
            });
          }

          function formatTime(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Los_Angeles' });
          }

          async function main() {
            const token = await getAccessToken();

            // Get today's date range in LA time with proper RFC3339 timezone offset
            const now = new Date();
            const la = new Date(now.toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
            const today = la.toISOString().split('T')[0];
            // Compute LA offset (e.g. -07:00 for PDT, -08:00 for PST)
            const diffHrs = Math.round((now.getTime() - la.getTime()) / 3600000);
            const offset = `-${String(diffHrs).padStart(2,'0')}:00`;
            const timeMin = `${today}T00:00:00${offset}`;
            const timeMax = `${today}T23:59:59${offset}`;

            // Get all calendars
            const calList = await calGet('/calendar/v3/users/me/calendarList', token);
            const calendars = (calList.items || []).filter(c => c.selected !== false);

            // Fetch events from all calendars
            let allEvents = [];
            for (const cal of calendars) {
              const calId = encodeURIComponent(cal.id);
              const params = `timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}&singleEvents=true&orderBy=startTime&timeZone=America%2FLos_Angeles`;
              const events = await calGet(`/calendar/v3/calendars/${calId}/events?${params}`, token);
              if (events.items && events.items.length) {
                allEvents = allEvents.concat(events.items.map(e => ({
                  title: e.summary || '(no title)',
                  time: e.start?.dateTime ? formatTime(e.start.dateTime) : 'All Day',
                  end: e.end?.dateTime ? formatTime(e.end.dateTime) : '',
                  allDay: !e.start?.dateTime,
                  calendar: cal.summary
                })));
              }
            }

            // Sort by time
            allEvents.sort((a, b) => a.time.localeCompare(b.time));

            const data = JSON.parse(fs.readFileSync('personal/data.json', 'utf8'));
            data.agenda = allEvents;
            data.agendaUpdated = new Date().toISOString();
            data.lastUpdated = new Date().toISOString();
            fs.writeFileSync('personal/data.json', JSON.stringify(data, null, 2));
            console.log('Calendar updated:', allEvents.length, 'events today');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Claude AI — summarize agenda
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('personal/data.json', 'utf8'));
          const events = data.agenda || [];
          const list = events.length ? events.map(e => `- ${e.time}: ${e.title}`).join('\n') : 'Nothing scheduled today.';
          const prompt = `J's Google Calendar today:\n${list}\n\nWrite ONE casual sentence (max 15 words) about today's schedule. If it's clear, say so — that's a good thing.`;
          const body = JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 80, messages: [{ role: 'user', content: prompt }] });
          const req = https.request({ hostname: 'api.anthropic.com', path: '/v1/messages', method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': process.env.ANTHROPIC_API_KEY, 'anthropic-version': '2023-06-01', 'Content-Length': Buffer.byteLength(body) }
          }, res => {
            let d = ''; res.on('data', c => d += c);
            res.on('end', () => {
              const r = JSON.parse(d);
              const summary = r.content?.[0]?.text?.trim() || '';
              console.log('Claude calendar summary:', summary);
              data.agendaSummary = summary;
              data.lastUpdated = new Date().toISOString();
              fs.writeFileSync('personal/data.json', JSON.stringify(data, null, 2));
            });
          });
          req.on('error', e => { console.error('Claude error:', e.message); process.exit(0); });
          req.write(body); req.end();
          EOF

      - name: Commit and push
        run: |
          git config user.name "CalendarBot"
          git config user.email "bot@jessyca-dashboard"
          git add personal/data.json
          git diff --staged --quiet || git commit -m "CalendarBot: refresh agenda + Claude summary [skip ci]"
          git push || (git pull --rebase origin main && git push)
